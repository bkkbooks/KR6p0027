body:
  text: 許序曰昔佛法入中國既數百年慧遠法師方以淨土收束羣靈雖一百二十三人未能一生都辦然一生取辦者不少矣此一百二十三人皆以宏誓互相鉤攝深諧佛願畢發蓮香轉度冤親引生眷屬後之聞水聲而開念佛入寂定而往西方夢兆神徵輝映震旦固皆此一脈之明暗相生也宗門識高力透高步人天直趨無上寂光權抑三種淨土實報方便同居甘芳不著妙勝醍醐然不遇夫上根必化而為毒藥故曹溪八世孫永明禪師回宗鏡之全光入西方之一脈焉諸法門中花嚴大備雲棲大師具正知見游花嚴法海悲深識卓思精用宏撰成彌陀疏鈔委曲引歸極樂老實念佛天龍喜歡無量眾生如得慈母故禪講兩家之未能不受後有者無不以此為神明休息之地禪講兩家之已能不受後有者無不以此為水月道場之緣自度度人無等等法捨念佛往生一門而更何有也噫神游法界璀璨玲瓏步三教之園林得一心之歸宿吾友鄭子今庶幾焉著宗鏡堂叢書四十八種以修西定課為第一予一見生歡喜心與眷屬謀首取而刻之願興十方信心人同此光明受用耳仁和許樾身自序曰非定不戒非定不慧不定者輪回之象也一切眾生累劫以來孰不曾為善孰不曾修行孰不曾念佛孰不曾發願但以心光不定淨土未生故長久漂沈不蒙解脫耳苦哉痛哉依我此書每日修持必有光明來相接引三生眷屬其共勉焉咸豐十一年正月淨業學人菩薩戒鄭澄德學川鄭澄源學烺排定注明謹序其緣起以此功德願我君父安平淨業光昌慧音成就先舉香讚心香乍爇法界同熏蓮池海會悉遙聞我佛起祥雲嘉瑞繽紛接引願方殷嘉瑞繽紛接引願方殷每一圈擊魚一聲信心為香法界者統心法事法之所到而為界言其廣大無所不包也蓮池海會指西方淨土中人也我佛指阿彌陀也必言我者從我心光明中出現光明不聚不能見佛也起者從西方極樂世界來赴東土娑婆世界也嘉瑞樓閣幢旛異香天樂之類也繽紛文彩交互也願方殷者阿彌陀佛修行之時作法藏比丘對世自在王如來前發四十八願願願成就方成佛道其四十八願皆是多設方便廣度十方六道眾生勸其念佛生於極樂世界中修行不退便悟真宗成就威神轉相化度也今阿彌陀佛願力圓成作佛已久願光慈照接引心深譬如一鏡涵空影來則現所以叩之而無不通也南無蓮池海會佛菩薩三稱三拜佛說阿彌陀經佛東方娑婆世界釋迦牟尼佛也釋迦在此娑婆成佛隨眾生壽不過百年愍念娑婆眾生見佛不易釋迦以後彌勒以前千萬年中受大苦惱故說此阿彌陀經流布世間使諸苦惱眾生修七日之功免永劫之苦轉凡成聖不退佛因也經法也經名阿彌陀者純說阿彌陀佛度生因緣功德也阿者無也彌陀者量也其佛萬德圓成不可窮盡故名無量於萬德中願為最勝願力大故光明無量願心長故壽命無量也諸經所稱無量壽佛無量光佛即此佛矣釋迦說此經在東土娑婆世界南贍部洲舍衛國傳至震旦震旦即南洲東邊我輩所居也梵文古茂不可持誦有姚秦時之三藏法師鳩摩羅什者翻譯此經經義圓妙不可淺測有大清朝之菩薩戒鄭學川者作為今解今解者取經中今現在說法今發願今生之義望人一生取辦便不入於父母之胎妙取蓮花高超界外也夫佛說我聽皆從心現但是心說心聽耳心體如鏡山河大地人物虗空我及如來種種形類但是妙圓心鏡中所現影子耳如是我聞如者心之真體譬如鏡也是者心中所現法譬如在全鏡上指出一個影子也我者二義自經言之即是結集之阿難也自讀經言之即是持誦之人也聞者心慧之動機也心耳同用方謂之聞一時佛在舍衛國祇樹給孤獨園祇音其一時者諸天及人時分各異佛音周徧不能專指一方也佛釋迦牟尼也生於周昭王時歿於周穆王時大悲影現來度眾生非歿非生現作生歿譬如水月燈雲玲瓏妙映耳佛之本體但是光明吞吐虗空無處不到豈有生死往來耶佛者覺也無有不覺之處無有不覺之時破盡昏沈自他咸度故稱佛也梵云舍衛此云聞物也祇祇陀太子也給孤獨長者之號也長者買太子之園以供佛太子但賣園不賣樹自以樹供佛故園樹二名稱地也與大比丘僧千二百五十人俱比丘此言乞士也上乞法於佛下乞食於眾生僧眾也皆是大阿羅漢菩薩為大乘緣覺為中乘聲聞為小乘阿羅漢者聲聞乘之第四果也阿羅漢有三義一者能殺煩惱賊二者怖散一切魔三者應受人天供也大阿羅漢者發菩薩心轉入大乘者也眾所知識皆知其名皆識其面言德望全也此一千二百五十羅漢多有大菩薩影生其中長老德勝為長臘高為老出家一歲為一臘此二字通指以下十六羅漢也舍利弗舍利此言鶖鷺也弗此言子也尊者之母目明如鶖鷺故尊者名鶖子也此尊者智慧第一言此發願往生一法非大智慧者不能圓信故首列之也摩訶目犍連犍音尖摩訶此云大也目犍連此云采菽氏也摩訶迦葉葉音攝此云大飲光也摩訶迦旃延此云大文飾也摩訶俱絺羅絺音郗此云大膝也離婆多此云星宿也周利槃陀伽伽音茄此云繼道也難陀此云善歡喜也阿難陀此云慶喜也佛之堂弟佛成道日乃生為佛侍者數十年佛之經典多由彼結集羅睺羅此云覆障也佛生淨飯王家名悉達太子太子欲出家父王不許且為納妃欲其傳後太子以手指妃之腹曰六年之後當生一子說此語後太子即出家未住母胎時障父出家既住母胎時自障六年故云覆障也此尊者前世塞鼠穴六日故現此報憍梵波提憍音交此云牛呞也牛嚥後吐出復嚼曰呞此尊者前世罵人為牛故現此報賓頭盧頗羅墮賓頭盧此云不動也頗羅墮此云利根也上名下姓迦留陀夷此云黑光也摩訶劫賓那那奴何切此云大房宿也薄拘羅此云善容也阿㝹樓䭾㝹奴侯切此云無貧也此尊者無目心眼洞見以此居十六人之末言西方境界當心領神會而造之也如是等諸大弟子以此十六例一千二百五十人也并諸菩薩摩訶薩菩者菩提也此云覺薩者薩埵也此云有情上兼覺下兼情以佛覺度有情斯為菩薩矣摩訶薩猶云大道心眾生也文殊師利法王子文殊師利此云妙首也此菩薩大智無遮於佛所言更無疑惑故首列之也於法自在名曰法王即如來也大菩薩能傳佛法為法王子矣阿逸多菩薩阿逸多此云無能勝也即彌勒菩薩之名彌勒此云慈氏菩薩之姓也彌勒在釋迦後一千萬年方成佛道釋迦化度未熟之眾生皆以付之但眾生之中種性不一有性急不耐生死不能待一千萬年後之龍華三會宿緣既露勝境先成故釋迦於彌勒前說此經欲彌勒於未成佛前速滿眾生之願扶持加被達之西方也又以中下眾生修行易退彌勒既未下降成佛則眾生見佛當在何時若不早取生西一落三塗出頭無望往往有龍華會散而眾生未復人身者故釋迦已去彌勒未來此經乃能拔出一切苦宅眾生而成就之恩甚重路甚捷矣夫三教聖人迭興而救世應時及節各立規模若言天下無二道聖人無兩心稱性而談一真如貫若於天上人間了生死不了生死之中求一萬全無弊者則方便百千而淨土法門為第一焉何必佛門神通即此往生得一切神通之腦也何必道家金丹即此蓮花洗一切金丹之習也何必儒宗理學即此一心不亂破一切理學之障也得其本而三教皆枝末矣本者一念之心也然必見佛見心方悟非心非佛自然縱橫三教出入龍華矣嗚呼文殊悟西方之理而首壓尊班彌勒會往生之機而名居第二無邊凡聖孰敢輕議此經乎乾陀訶提菩薩乾陀訶提此云不休息也既信淨土尚未往生能以不休息為心自然步步踏著也常精進菩薩精則不麤進則不退恒常如此故能以淨土之法自度而度人也與如是等諸大菩薩以此四尊例一切菩薩也及釋提桓因等無量諸天大眾俱釋提桓因此云能天主即世所稱天宮玉帝也無量諸天者玉帝居忉利天宮宮在須彌山頂旁有四面面各八王統名三十三天忉利之下須彌山埵有東西南北四大天王分掌四十種小天忉利之上虗空而住者夜摩兜率化樂自在合之忉利四王名欲界天也過此以上無復女人名禪界天也過此以上無復色身名空界天也三界之中欲界最雜空界無身感佛威神現身聽法此非思議之所能及也大眾通指欲界天上天下龍鬼神仙人物之能聽法者俱共也謂與聖人同入佛會也爾時佛告長老舍利弗佛告者悲心轉切故不待問也從是西方從由也是概指此娑婆世界也西方者向西方去也單指一方者定於一方神志專寂方能發起修行功用而成就也必云西者以娑婆適在極樂之東耳無他義也過十萬億佛土千萬為億或曰十萬為億佛土一大千土也一大千中一佛主化有世界世者時分謂過去現在未來也界者地分謂八方上下也於一片心光中而現虗空於虗空中而現風輪於風輪中而現地界地分既立時分隨起故稱世界矣心光無量虗空無量一切世界亦復無量故有西方極樂世界及極樂之西方種種世界有東方娑婆世界及娑婆之東方種種世界上方之上下方之下南方之南北方之北無不各有種種世界焉我輩所居名曰娑婆娑婆堪忍也言眾生忍苦也佛大慈悲故對此苦眾生而說十萬億剎外之世界欲眾生以一念飛心而橫出此娑婆也二乘不出大千梵世或拘中小天福所限在一界中神仙丹力在欲界內平心思之卑小不足言也佛乃於眾生大夢中呼而告之曰過十萬億土有世界嗚呼方知別有乾坤矣心性輪即人之一念也心性輪中現虗空輪虗空輪中現無量風輪一風輪中現一金輪即地輪之下面也金輪上現火輪火輪上現水輪水輪上露出種種山種種洲即地輪之上面也居中最妙而高者須彌山山腰中一日一月回環而來往地輪低處名曰地獄地輪高處須彌頂須彌埵皆曰天宮過須彌頂依空而住之四種天連須彌頂忉利天須彌埵四王天名六欲天再上有三層天名曰初禪如是初禪至於地獄名為小世界也積一千個小世界名曰小千有二禪天王主之積一千個小千世界名曰中千有三禪天王主之積一千個中千世界名曰大千有四禪天王主之四禪天中有無想天五不還天寄居焉天王不見不知也四禪以上名曰空天魂識雖存身相消滅亦在大千中也如是大千名一佛土彌陀之極樂一大千也釋迦之娑婆亦一大千也一大千中現百億日月現百億化佛淨穢短長隱顯出沒彼此輝映而成文如雲中燈如水中月世界相疊名世界海世界海重重無盡出於世界種世界種重重無盡出於蓮花香水海中此花藏中種種莊嚴名花嚴也蓮花則一譬如真心世界則多譬如妄想然即此蓮花非真非妄也名曰極樂統指西方則世界甚多好醜不一標明極樂則專誠決定更無歧誤之憂矣世人以西天作西方淨土非也西天乃天竺國是娑婆內之西方非娑婆外之西方不可錯會人間天上之樂不及彌陀國土二乘禪定之樂不及彌陀國土一切諸佛剎中有因緣未符有功修帶退雖有種種之樂亦不及彌陀國土生彌陀國土者自然花開自然見佛自然聞妙法自然發神通自然度生自然成道靈氣蕭然更無餘累圓融一鏡方是樂矣其土有佛號阿彌陀佛為一世界中教化之主故首標之又阿彌陀佛專以名號教人持念而得往生故急標之阿者無也彌陀者量也佛者覺也覺者心之光明也阿彌陀佛以無量心光而成佛我輩亦以無量心光而念佛以阿彌陀念阿彌陀念念皆歸無量也心之光明如一大圓鏡周滿虗空無彼無此我取之則全是我鏡也佛契之則全是佛鏡也以佛鏡中之我念我鏡中之佛以我鏡中之佛度佛鏡中之我今現在說法現在者非如釋迦住世八十餘年俄成過去也非如彌勒歷千萬年下降方在未來也眾生今日不得解脫眾生今日急求解脫說法於今日非今日之救急神方乎雖曰十萬億但是一心光心念動處即能於心鏡中而成感應諸佛心光融通三世眾生不悟且滯於今即所滯而成通無上醫王之妙用也後文云成佛以來於今十劫又曰今發願若今生嗚呼錯過而今必一誤而生百誤人命在呼吸宜各自勉之舍利弗前之我聞是即阿難之我而顯一切誦經者之我此之舍利弗是即舍利弗之心而喚醒一切眾生之心故頻呼頻喚也嗚呼一月千江理通凡聖我輩若明佛用安得不感激涕零而思所以報佛恩乎彼土何故名為極樂其國眾生無有眾苦但受諸樂故名極樂眾生者合眾陰而有生者也眾陰五陰也色之一陰名曰外法受想行識名曰內心為五陰所拘牽即佛體而成眾生不為五陰所拘牽即眾生而證佛體眾苦者三苦五苦八苦也苦時名苦苦樂時不堅名壞苦中等境界不可住名行苦此三苦也生時苦昏濁甚也老時苦疲癃極也病時苦痛癢深也死時苦神脈亂也苦時苦境界違也此五苦也將一苦苦開之為四便成八苦所謂求不得苦愛別離苦怨憎會苦五陰盛苦諸樂者兼世間樂出世間樂言之也七寶光明飛行來往世間樂也念佛法僧與上善聚出世間樂也不退菩提證入補處出世間上上樂也至於此受無所受名曰正受受無所受是悟境受有所受是未悟境極樂世界兼而有之常寂光土即在同居即聖即凡三根並往佛無不引手而援之也又舍利弗極樂國土七重欄楯七重羅網七重行樹皆是四寶周帀圍繞他世界以鐵圍為障極樂世界以寶欄寶網寶樹標其疆界備剎土之儀式而已四寶金銀琉璃玻瓈也是故彼國名為極樂纔入西方先見重重寶聚光明頓悟爾界此疆皆如影現此生平未見之第一樂也又舍利弗極樂國土有七寶池淨業所感平直光明故無山海之險也但以寶池樓閣光華映帶而已七寶池者七處寶池也八功德水充滿其中八功德者一澄淨二清冷三甘美四輕輭五潤澤六安和七除饑渴八長養諸根也池底純以金沙布地泥沙者惡業所感也神明清發善業堅純故感現金沙矣四邊階道金銀琉璃玻瓈合成上有樓閣亦以金銀琉璃玻瓈硨磲赤珠瑪瑙而嚴飾之琉璃非石汁也玻瓈非礦脂也硨磲非紋石也赤珠非蚌精也以此土之物名顯彼土之物相彼土之物實非此土之可比也池中蓮華大如車輪青色青光黃色黃光赤色赤光白色白光微妙香潔生彼土者以蓮花為父母故詳讚之極樂世界並無女人女人往生皆成男子故人皆生於蓮花中也濁世血肉之胎重麤臭穢故人之福慧光明在母腹中全然亡失及其生而轉轉不靈也淨土蓮花之胎微妙香潔故人之福慧光明在佛性中一時炳現及其生而運運全超也諸天宮中亦有蓮華然但因福報並無了緣是有量非無量也若以一念念佛影子落於阿彌陀佛心鏡之中神明發而因果皆靈自能永永玲瓏優入聖位蓮花從心化出凡人發一念願往之時西方七寶池中便生蓮萼一朵若能念念熏修則寶脈深涵香風茂著矣大如車輪言與身相稱也若諸天龍身長數百里往生花輪必不能反縮小也淨土菩薩身量廣長不可思議豈拘拘於數尺以為輪乎當知一切諸法從心量而不同神明自召非如來之有以限人也念心靈發光明相交即心即花凝然一際故身未往而神明已住花中矣舍利弗極樂國土成就如是功德莊嚴此是國土疆界寶池蓮萼之莊嚴也又舍利弗彼佛國土常作天樂西方音樂不扣自鳴此以寶音聲莊嚴於上也黃金為地此以寶光明莊嚴於下也晝夜六時雨天曼陀羅華戌子寅為夜三時辰午申為晝三時修行者候之以為節夫極樂國土純是光明境界豈借日月以分晝夜但是蓮花開合而已雨降也曼陀羅白色也前以聲光莊嚴界分此以香光莊嚴時分縱橫自在全現寶心其土眾生名為眾生實菩薩也常以清旦初日分也各以衣裓盛眾妙華供養他方十萬億佛裓音革往生之時飛心妙出十萬億佛土往生之後飛身妙入十萬億佛土衣裓衣襟也分身靈變普到佛前故能一晨朝而徧供十萬億也即以食時還到本國辰去已還玲瓏影現多寡遠近固不足以累其心也飯食經行有以禪悅為食者有以見色聞香為食者有食變化飲食者食後經行動靜皆入佛機也舍利弗極樂國土成就如是功德莊嚴此是佛我身心自在供養之莊嚴也復次再言也舍利弗彼國常有種種奇妙雜色之鳥以下鳥名多是比例彼國眾鳥本無定形不可以大小濃淡思也白鶴孔鸚鵡舍利迦陵頻伽共命之鳥舍利鶖鷺之類也迦陵頻伽妙音神鳥也共命鳥一足一翼相並則生相分則死爾雅謂之比翼世俗號曰雙頭恩愛苦纏報成此鳥彼土化現若同此形也是諸眾鳥晝夜六時出和雅音其音演暢五根五力七菩提分八聖道分如是等法有三十七助道品四意止四正勤四神足及根力覺道也五根者信進念定慧也五力者根所發也七覺者一擇法二精進三喜四除五捨六定七念也八道者正見正思惟正語正業正命正精進正念正定也其土眾生聞是音已皆悉念佛念法念僧故善用其所聞者一切音皆是佛音也法者佛之所以成佛者也僧者菩薩聲聞也舍利弗汝勿謂此鳥實是罪報所生所以者何彼佛國土無三惡道三惡道謂地獄餓鬼畜生也或問極樂無女人無脩羅無神仙無魔外身界坦然故刀兵水火妻子室家之累無從而生何但言無惡道答曰上文無有眾苦一句包之矣舍利弗其佛國土尚無惡道之名何況有實是諸眾鳥皆是阿彌陀佛欲令法音宣流變化所作非實有也舍利弗彼佛國土微風吹動諸寶行樹及寶羅網出微妙音譬如百千種樂同時俱作聞是音者自然皆生念佛念法念僧之心前之化作靈禽啟人念佛有情說法固已妙造玲瓏矣今再寫出無情說法之音忽如寶網微風一時吹動讀至此何能已於發願往生也或問有實相念佛深觀佛理是也有觀想念佛入西方定是也有觀像念佛對像生敬是也有持名念佛字句分明是也西方眾生念佛是如何念答曰不滯於名即生實相聲中入定即音即光四種念佛都是一種念佛也舍利弗其佛國土成就如是功德莊嚴此是應時及節感發修行之莊嚴也舍利弗於汝意云何彼佛何故號阿彌陀已釋佛剎之名再釋佛身之號說唯心淨土者未必能神游佛剎說自性彌陀者未必能量同佛身口說而不心行安得有往生之樂乎舍利弗彼佛光明無量一切眾生本元心地光明無量一切諸佛證一切眾生本元心地故光明同一無量但一切諸佛之無量光明眾生難見而阿彌陀佛之無量光明眾生易見則因緣之生熟不同也阿彌陀佛之因緣既與眾生熟故無量光明之接引決定決定無疑惑矣照十方國無所障礙十方國土有種種鐵圍諸山須彌大海紛紛堅礙障於人心心地化作光明方得玲瓏而自在矣佛以光明為全體故徧照於十方眾生堅執而不通故難見夫一佛然就佛言之但有光明毫無障礙於一片光明中障礙總是光明也知此理者於往生時品地必超心得決定是故號為阿彌陀此就光明上說無量也又舍利弗彼佛壽命及其人民無量無邊阿僧祇劫故名阿彌陀此就壽命上說無量也阿僧祇無數也劫長時也舍利弗阿彌陀佛成佛以來於今十劫此今字對此娑婆賢劫言之於無量而纔現十劫則累劫昏沈眾生無不仗光明之接引也又舍利弗彼佛有無量無邊聲聞弟子皆阿羅漢非是算數之所能知諸菩薩眾亦復如是數上聲二乘根種不生淨土淨土羅漢大率已發大菩薩心略證聲聞便階大士光明至此身如影響而已矣舍利弗彼佛國土成就如是功德莊嚴此是主伴玲瓏光明壽命之莊嚴又舍利弗極樂國土眾生生者皆是阿䟦致鞞音皮阿無也䟦致退也在此修行多苦多魔如風中一毛不能自主一生極樂便登不退矣其中多有一生補處其數甚多非是算數所能知之但可以無量無邊阿僧祇說補處者到他方世界候時成佛之等覺菩薩也從人至佛生生世世進退不可知數唯淨土眾生有能不入多生一生直入他方補處者言緣勝劫長廣大成就者多也舍利弗眾生聞者應當發願願生彼國阿彌陀佛號曰願王在一切佛中度生之願最為第一眾生順佛願而發往生之願如石吸鐵如燈發光如桴擊鼓互感互應妙願成機念念玲瓏往生無不玲瓏也所以者何得與如是諸上善人俱會一處夫過去難追未來不可測受現在之苦而引未來之殃此人情所大不安者也唯精持佛號早生西方瞻仰者既有如來聚處者無非上善光明所照熏發而成就之者神矣舍利弗不可以少善根福德因緣得生彼國一切修行而不以念佛為因泛泛念佛而不以精持四字為緣於淨土時機全無收束故善福無多也彼佛光明無量眾生以有量之善福求之彼此相懸是故不可舍利弗若有善男子善女人聞說阿彌陀佛六道眾生各有男女心能信佛便名善矣聞說阿彌陀佛者於他人邊聞說有阿彌陀佛之境界也執持名號便將此阿彌陀佛四字名號執而持之執者心緣四字而不退也持者口誦四字而不斷也名號之外更無彌陀彌陀之為彌陀四個字盡之矣萬德洪名洪名萬德以名召德一句全收一句中更有何欠少乎夫無欠少之心便是無量也便是阿彌陀也此其善福因緣固不可以多少測也譬如一滴之水投於大海滴滴之水投於大海無有一滴而非海也夫佛外無禪念外無參即念佛便是參禪不必另作參禪之想若於念佛時看念佛的是誰又念又看却成二念不如一直念去也執字是一切修行者之病一切眾生之所以不得成佛者執情累之也然熱病已深石膏可用中宮既滿硝朴可施一味平淡不足起死回生故以執破執而病可霍然也執持極而心光露心光露而佛光臨行人不知而佛則洞鑒之也且行人亦何嘗不知也但辦一心不亂自然換得一副骨頭修行人於此苦得一番便好若一日若二日若三日若四日若五日若六日若七日統言執持名號是恒常精進也切指一日七日是勇猛精進也如煉丹藥或用文火或用武火一心不亂心無真妄而現真妄真妄迭興還源不可得真妄皆妄心之所以亂也以無量之心念無量之佛不復作有量無量之想是之謂不亂其人臨命終時阿彌陀佛與諸聖眾現在其前臨終者將死一念之前也佛現而在其前一心不亂之所感也夫我心佛心如鏡照鏡一心念佛是東鏡入西鏡也命終見佛是西鏡入東鏡也雖互相入而無往來之迹但光明相接而已一切修行之所以不能了局者臨命終時無把握故也雖復氣脈澄清爐香上達往往局於天上神仙境界降此以下更屬無聊有見火車獄卒者矣有誤入於堂宇園林而化成惡道者矣唯此阿彌陀經單提出臨命終時四字如春雷一震百蟄皆驚具慧命法身者莫不有出頭之路也此理難聞此機難發既聞此理矣既發此機矣三生眷屬可不勉歟是人終時心不顛倒即得往生阿彌陀佛極樂國土終時者正捨報之一念也不顛倒者正念現前也旁觀者見此人心不顛倒便可信此人決已往生也聞經而發願發願而持名持名而見佛見佛而往生五者相因自然之次第今之人神脈顛倒不得往生但有持名之功又不到一心不亂所以昏散者滿於域中而慈航乃虗而無濟也不發願由於不聞經不往生由於不發願更有貪於見佛嬾於持名將此念佛一門化作平板無靈之局面嗚呼無上靈丹變成臭腐真珠寶網空葬泥沙皆心神不能圓聚故也念佛者念念威神全同我佛廣大如法界究竟如虗空心光明中決無魔事也舍利弗我見是利故說此言若有眾生聞是說者應當發願生彼國土頻勸發願是心願佛願願願交光持作往生之券也若謂念佛一門但以誘引凡下者實乃罪同謗佛舍利弗如我今者讚歎阿彌陀佛不可思議功德之利有形之德謂之功無形之功謂之德功德有益於眾生名曰利矣不可以心思不可以口議言阿彌陀佛之功德乃無量之功德也讚歎者有釋迦佛讚歎者不止釋迦佛以我例彼故曰如也東方亦有阿閦佛須彌相佛大須彌佛須彌光佛妙音佛如是等恒河沙數諸佛閦音促娑婆在極樂之東而娑婆之東世界正復無量也極樂在娑婆之西而極樂之西世界正復無量也世人小見但知有六合耳豈知世界外之世界各各有大智慧光明如來永劫悲懷勸人念佛耶阿閦此云不動也須彌山名此云妙高也即世界正中最大之山以山名為佛名狀其德相之妙高也各於其國出廣長舌相徧覆三千大千世界舌相無量由於身相無量也身相無量由於心相無量也處處說法法滿大千名為徧覆矣然佛身現剎佛剎現身身中現身剎中現剎舌覆大千未嘗不實有其事也說誠實言一切眾生聞經不信叢林僧眾有終身誦此為課而不發一念往生之心者濫取古人之願文循例誦之如數他人寶自己無一錢心外見法流而不返嗚呼滔滔皆是矣汝等眾生當信是稱讚不可思議功德一切諸佛所護念經稱讚宣揚其美也不可思議功德指彌陀以名號度眾生也一切諸佛六方佛及釋迦佛也所護念信彌陀功德發願往生內外諸魔或加殘害一切如來常加護念以威神加被而成就之也此十五字是經之名今稱阿彌陀經者省文也舍利弗南方世界有日月燈佛名聞光佛大𦦨肩佛須彌燈佛無量精進佛如是等恒河沙數諸佛各於其國出廣長舌相徧覆三千大千世界說誠實言汝等眾生當信是稱讚不可思議功德一切諸佛所護念經名聞光者名聞他界如光明之盛也𦦨肩者福慧當躬如兩肩發𦦨也舍利弗西方世界此經六方是指娑婆極樂十萬億佛土之外東方指娑婆之東西方指極樂之西有無盡之西東故有恒河沙數諸佛廣標西方別稱世界其不指極樂可知也有無量壽佛此佛之名偶同阿彌陀佛之別名所謂同名佛也每一佛出同名者無量或在前或在後或同時一佛既可以多名多佛亦可以一名佛佛名名燈雲水月也無量相佛無量幢佛大光佛大明佛寶相佛淨光佛如是等恒河沙數諸佛各於其國出廣長舌相徧覆三千大千世界說誠實言汝等眾生當信是稱讚不可思議功德一切諸佛所護念經無量幢者佛之福慧光相高明如幢而復無盡也舍利弗北方世界有𦦨肩佛最勝音佛難沮佛日生佛網明佛如是等恒河沙數諸佛各於其國出廣長舌相徧覆三千大千世界說誠實言汝等眾生當信是稱讚不可思議功德一切諸佛所護念經難沮者佛性雄猛不可抑遏也日生者如日初出光𦦨熊熊也舍利弗下方世界有師子佛名聞佛名光佛達摩佛法幢佛持法佛如是等恒河沙數諸佛各於其國出廣長舌相徧覆三千大千世界說誠實言汝等眾生當信是稱讚不可思議功德一切諸佛所護念經師子一切獸中王也如來一切法中王也故以為名也達摩此云法也舍利弗上方世界有梵音佛宿王佛香上佛香光佛大𦦨肩佛雜色寶華嚴身佛娑羅樹王佛寶華德佛見一切義佛如須彌山佛如是等恒河沙數諸佛各於其國出廣長舌相徧覆三千大千世界說誠實言汝等眾生當信是稱讚不可思議功德一切諸佛所護念經月為星宿中王如佛為一切法中王也香上者佛香為一切香中之上也香光者心信成香香淨發光也嚴飾也娑羅此云堅固也樹王大樹也寶華德者寶華之性明潤開顯而有馨香之感發也舍利弗於汝意云何何故名為一切諸佛所護念經舍利弗若有善男子善女人聞是經受持者及聞諸佛名者是諸善男子善女人皆為一切諸佛之所護念皆得不退轉於阿耨多羅三藐三菩提佛佛心同不分彼此故眾生念一佛名無量如來歡喜也阿無也耨多羅上也三藐正等也三菩提正覺也凡夫不求正覺也外道求正覺而不正也羅漢似正覺而不等也上等諸佛下等眾生方曰等矣然菩薩雖等不為無上也無上正等正覺便是佛矣不退轉於佛道由聞經聞佛之故此經之威力大矣同護也同念也同見其為圓融一覺無退理也同見其為因緣入妙無退機也若自退其念佛之心則顛倒乖違佛所不能護也主伴重重一時圓現不出我一念中也如一鏡中現無量鏡光光中鏡鏡互映嗚呼何必花嚴耶何必非花嚴耶是故舍利弗汝等皆當信受我語及諸佛所說不信不受諸法無靈一句入神諸佛歡喜何以故一切眾生皆於如來心中動也一切如來皆於眾生心中住也非動也非住也唯一圓融清淨寶覺而已當信當受通聖通凡我輩宜如何加勉也淨土一門為無邊聖賢游集之道場謂頓悟自心不須念佛往生者豈真勝於智慧第一之舍利弗乎夫觀經之標九品也上品菩薩境界中品羅漢境界孰謂聖賢不求往生耶舍利弗若有人已發願映下若已生今發願映下若今生當發願映下若當生欲生阿彌陀佛國者佛國淨土即一涵三唯佛所居常寂光也光中所現菩薩住處則實報無障礙土也所現聲聞住處則方便有餘土也所現眾生住處則凡聖同居土也鏡光圓攝四土本融纔落言思便成一土若上上聰明人悟得高即是下下即是高心空則境靈發願往生不須籌度也當將來也是諸人等皆得不退轉於阿耨多羅三藐三菩提於彼國土若已生帶已發願句若今生帶今發願句此句最重若當生帶當發願句今發願則今生矣鼓棰在手而憂鼓之不響耶早對彌陀䖍伸懺悔是故舍利弗諸善男子善女人若有信者應當發願生彼國土釋迦將滅度留此一經弗待咨詢叮嚀勉勖而經中之法又簡中之簡易中之易捷中之捷穩中之穩超中之超圓中之圓嗚呼至於此而恩已極矣然而業海多漚生滅自局習氣成於累世妙法聞於一朝信力如螢難當風雨所以發願者百不獲一焉念佛者滿於世間吾不知其歸於何用也舍利弗如我今者稱讚諸佛不可思議功德彼諸佛等亦稱讚我不可思議功德而作是言是言指以下六十字釋迦牟尼佛能為甚難希有之事能於娑婆國土五濁惡世劫濁見濁煩惱濁眾生濁命濁中得阿耨多羅三藐三菩提為諸眾生說是一切世間難信之法釋迦此云能仁也牟尼此云寂默也甚難希有指成佛說法二事也成佛不難難於在五濁成佛說法不難難於說一切世間難信之法也合四濁以成劫濁見者惑也煩惱者身心不自在也眾生者攬陰不淨惡名穢稱也命者色心相持不能堅久也夫我釋迦於此濁惡世界中現如來身說此微妙玲瓏之一法鑿凡心而開聖竅換毒藥而錫醍醐恩上之恩利中之利也而我輩者俗見堅牢惡根難拔聞言不信空過一生再出頭來不知何日可謂深棄佛恩矣舍利弗以下是釋迦自己所言故又呼舍利弗名也當知我於五濁惡世行此難事得阿耨多羅三藐三菩提為一切世間說此難信之法是為甚難絡繹回環主賓交映至於此而復自述其難則字字血痕全帶玲瓏之色也嗚呼我與如來同此一心奈何自疑其心而不如心以念佛也知此事之歸於一易可以解如來兩難之憂佛歡喜我歡喜全現心中極樂之影矣因此力便太易而人不能信故翻成難法嗚呼眾生之拙一至此乎汝心中之佛已現矣已演心法若干矣對鏡迷頭狂而四出皆喪心不顧者也說經至此方便已窮過此已往心佛不現矣明理念佛願徹無邊則超過一切世間難易皆成戲論心現淨土心自往生如鏡中鏡光明不二佛說此經已舍利弗及諸比丘一切世間天人阿脩羅等阿脩羅此云非天也有天之福無天之德常與天爭若回心入佛者則三毒一消便歸淨土非復前日之用心也聞佛所說歡喜信受歡喜即是飛心此超出娑婆之機也信受即是淨願此妙生極樂之竅也機竅玲瓏圓心四映作禮而去去字上有決斷往生意佛說阿彌陀經此六字亦當誦拔一切業障根本得生淨土陀羅尼凡念佛而不得往生者惡業障之耳根本堅牢枝條茂密無邊冤對幻影重重若非佛力加持那得超生淨土耶陀羅尼總持也謂總一切法持無量義也此土亦稱為呪此即往生呪也課時誦三徧南無阿彌多婆夜哆他伽哆夜哆地夜他阿彌利都婆毗阿彌利哆悉躭婆毗阿彌利哆毗迦蘭帝阿彌利哆毗迦蘭哆伽彌膩伽伽那枳多迦隷娑婆訶哆音多他音拖伽音茄毗音皮躭音丹膩女利切那奴何切枳音紙隷音利呪為密言不當求解死心誦之乃有奇應經呪已畢次舉佛讚阿彌陀佛身金色相好光明無等倫阿彌陀佛總舉法報化三身也身金色單指報身也相大而好小無等倫者無可為比也白毫宛轉五須彌紺目澄清四大海此於無可比中強作比譬也兩眉中間白毫八棱中空宛轉右旋其大如五座須彌山也紺青也四大海言其大也皆指報身也光中化佛無數億化菩薩眾亦無邊化佛有大小大者千尺小者丈六每一化佛有二化菩薩為侍者左觀音右勢至也病中人往生時所見接引之佛即此化身也四十八願度眾生九品咸令登彼岸九品指蓮花品數也於上中下之內各各開出上中下故成九品彼岸成道之地也南無西方極樂世界大慈大悲阿彌陀佛無著為大拔苦為悲與樂為慈唱一聲阿彌陀佛此四字佛名每一課以千聲為率要念得無首無尾句句皆如一句自然光明玲瓏矣當字字聲聲光明相接續不用唱南無觀世音菩薩凡稱南無者歸命之義也此菩薩心眼照世能觀其音世人誦此菩薩名者心中發光自觀其音當觀音之時便與此菩薩非一非二故能獲靈感得願求畢竟生於西方也三種菩薩名各唱三聲南無大勢至菩薩大心大力身所至處世界動搖頭有寶瓶光明不斷亦化小身入此娑婆世界專取念佛人而使之歸於淨土此菩薩以念佛心得無生忍其言曰都攝六根淨念相繼不假方便自得心開南無清淨大海眾菩薩其數多如大海之水心業成就久在極樂故清淨也一佛二菩薩因緣光明不為少矣又兼此海眾菩薩各以願力因緣而來救其眷屬一聲呼唱風動蓮心一人之身一切光明來照也次跪誦蓮池大師所作西方發願文一徧始焉歡欣繼而疲懈不得謂之發口談淨土心戀娑婆不得謂之願誦文者思之稽首西方安樂國接引眾生大導師我今發願願往生惟願慈悲哀攝受以下願文每數字一停頓停處引聲者以圈為記停處不須引聲者以乙為記久之音熟自然感發心靈矣弟子普為四恩三有法界眾生求於諸佛一乘無上菩提道故專心持念阿彌陀佛萬德洪名期生淨土又以業重福輕障深慧淺染心易熾淨德難成今於佛前翹勤五體披瀝一心投誠懺悔我及眾生曠劫以來迷本淨心縱貪瞋癡染穢三業無量無邊所作罪垢無量無邊所結冤業願悉消滅從於今日立深誓願遠離惡法誓不更造勤修聖道誓不退惰誓成正覺誓度眾生阿彌陀佛以慈悲願力當證知我當哀愍我當加被我願禪觀之中夢寐之際得見阿彌陀佛金色之身得歷阿彌陀佛寶嚴之土得蒙阿彌陀佛甘露灌頂光明照身手摩我頭衣覆我體使我宿障自除善根增長疾空煩惱頓破無明圓覺妙心廓然開悟寂光真境常得現前至於臨欲命終預知時至身無一切病苦厄難心無一切貪戀迷惑諸根悅豫正念分明捨報安詳如入禪定阿彌陀佛與觀音勢至諸聖賢眾放光接引垂手提𢹂樓閣幢旛異香天樂西方聖境昭示目前令諸眾生見者聞者歡喜感歎發菩提心我於爾時乘金剛臺隨從佛後如彈指頃生極樂國七寶池內勝蓮華中華開見佛見諸菩薩聞妙法音獲無生忍於須臾間承事諸佛親蒙授記得授記已三身四智五眼六通無量百千陀羅尼門一切功德皆悉成就然後不違安養回入娑婆分身無數徧十方剎以不可思議自在神力種種方便度脫眾生咸令離染還得淨心同生西方入不退地如此大願世界無盡眾生無盡業及煩惱一切無盡我願無盡願今禮佛發願修持功德回施有情四恩總報三有齊資法界眾生同圓種智四恩者在家則天地也君也親也師也出家則父母師僧國王檀越也三有者三界也法界眾生者十方無量世界一切眾生也心能運載一切法故名乘以佛為極不落二三故曰一乘也染心易熾者識火炎炎時常發起也淨德難成者心水不清佛月難現也翹勤五體表外儀恭也披瀝一心明內心敬也五體者兩肘兩膝及額也披瀝者開發洗蕩也投誠者以我之心歸投於佛也懺悔者斷相續心也言我及眾生者求生淨土須廣大心一體同觀方偕佛願故一人懺即是一切眾生懺也一切諸業不名決定懺之則無任之則有信以為能消滅一懺便滅何以故心力最強也冤有三有殺冤有盜冤有淫冤殺盜名怒冤淫名喜冤一切眾生以冤為親若念佛功深看得一切冤親如光如影則往生無累矣禪觀與持名本是兩法若體會經文想我之念佛音聲直入西方靈禽風樹之中與水流光明寶羅天樂融成一片便是觀想持名無二也此名西方禪定亦名音聲禪定病苦四大不調也厄難水火刀兵毒藥之類也貪戀許願求醫食肉懷恩也迷惑疑罪多功少佛不來迎也報報身也捨報謂正斷氣時捨此報身精神獨往也無生忍者一切諸法本自不生不滅既為眾生故顛倒妄見今以智慧而了達之故曰獲也得此忍已大用方成三身法身報身化身也四智八識之妄還源證真轉識成智其數有四也八識者眼耳鼻舌身為前五識意為第六識細意不外緣者名第七識心之本量含藏種子者名第八識修道之人轉前五識為成所作智轉第六識為妙觀察智轉第七識為平等性智轉第八識為大圓鏡智五眼肉眼天眼慧眼法眼佛眼也六通天耳通天眼通神足通他心通宿命通漏盡通也不退地者三義一位不退終不退為凡夫二乘也二行不退終不退失所修行業也三念不退不暫退轉菩提心念也又曰雖品居下下地局疑城然永斷三塗之因亦名不退也界生業惱四者不盡我之大願終亦不盡運此不盡之願力度此不盡之眾生方顯無量心光能與彌陀同調矣種智佛智也謂能通達一相無量相也或問曰此經單言持名願文忽說禪觀何也答曰若神明不入觀中所持之名非昏即散以持名為觀境非於觀外持名也或問曰觀境無聲觀心不動今乃經行持誦何謂觀乎答曰死法活用名曰善巧活法死執是謂癡人華嚴經云風中入定聲中入定古德云行亦禪坐亦禪即此經行持名便是神明在定也或問曰觀西方者見佛持名者於持名時能見佛乎答曰觀佛用心眼是心中色持名用心聽是心中聲然心觀佛色佛現而說法則有妙聲矣心聽佛聲神凝而現瑞則有妙色矣六塵萬法迴轉唯心子但神聽自己念佛之聲久之又久之到一時鼓寂鐘沈便與如來相見也
